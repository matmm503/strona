<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joanna Art Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-color: #ff6b6b;
      --bg: #121212;
      --text: #f5f5f5;
      --glass: rgba(255,255,255,0.06);
    }
    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    /* Header – cały pasek ma czarne tło, widoczny od razu */
    header {
      position: fixed;
      width: 100%;
      top: 0;
      background: #000;
      backdrop-filter: blur(10px);
      z-index: 1000;
      transition: top 0.3s;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: auto;
      padding: 1rem 2rem;
      flex-wrap: nowrap;
    }
    /* Napis "Joanna Art" – biały prostokąt z zaokrąglonymi rogami, czarna czcionka, bez zawijania */
    nav h1 {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 1px;
      white-space: nowrap;
      background: #fff;
      color: #000;
      border-radius: 8px;
      padding: 4px 10px;
      display: inline-block;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      transition: color 0.3s;
      white-space: nowrap;
    }
    nav a:hover {
      color: var(--main-color);
    }
    /* Sekcja Hero – przesuwamy niżej */
    .hero {
      margin-top: 4cm;
      height: 80vh;
      background: url('j.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom right, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
      pointer-events: none;
    }
    /* Hero content – mniejsze i szersze na telefonach, przesunięte niżej */
    .hero-content {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translate(-50%, 0);
      max-width: 80%;
      padding: 1.5rem;
      background: var(--glass);
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(15px);
      animation: slideUp 1.3s ease-out forwards;
      z-index: 10;
    }
    .hero-content h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .hero-content p {
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    /* Galeria „My Work” – zdjęcia zostają większe po Show More */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 2rem;
    }
    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    /* Początkowo ukrywamy dodatkowe zdjęcia */
    .gallery img.extra {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    /* Przycisk Show More */
    #showMoreButton {
      margin-top: 20px;
      padding: 0.8rem 1.6rem;
      background: var(--main-color);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    #showMoreButton:hover {
      background: #ff4c4c;
    }
    @media(max-width: 768px) {
      nav {
        padding: 0.5rem 1rem;
        justify-content: space-around;
      }
      nav h1 {
        font-size: 1.1rem;
        padding: 2px 8px;
      }
      nav a {
        margin-left: 10px;
        font-size: 0.95rem;
      }
      .hero {
        margin-top: 6cm;
        height: 70vh;
      }
      .hero-content {
        bottom: 5%;
        padding: 1rem;
      }
      .hero-content h2 {
        font-size: 1.7rem;
      }
      .hero-content p {
        font-size: 1rem;
      }
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <h1>Joanna Art</h1>
    <div>
      <a href="#about">About</a>
      <a href="#portfolio">Portfolio</a>
      <a href="#services">Services</a>
      <a href="#offers">Offers</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Hello, I'm Joanna</h2>
    <p>Professional portrait &amp; lifestyle photographer based in the Netherlands.</p>
    <a href="#contact"><button class="btn">Get in Touch</button></a>
  </div>
</section>

<section id="portfolio">
  <h2>My Work</h2>
  <div class="gallery">
    <img src="1.jpg" alt="Artwork 1">
    <img src="2.jpg" alt="Artwork 2">
    <img src="3.jpg" alt="Artwork 3">
    <img src="4.jpg" alt="Artwork 4">
    <img src="5.jpg" alt="Artwork 5" class="extra">
  </div>
  <button id="showMoreButton">Show More</button>
</section>

<script>
  document.getElementById("showMoreButton").addEventListener("click", () => {
    document.querySelectorAll(".gallery img.extra").forEach(img => {
      img.style.display = "block";
      setTimeout(() => {
        img.style.opacity = "1";
        img.style.transform = "scale(1)";
      }, 50);
    });
    document.getElementById("showMoreButton").style.display = "none";
  });
</script>

</body>
</html>
